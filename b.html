<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Web Diagnostics | Premium Platform</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Marked.js for rendering AI markdown output -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* High-End Corporate Dark Theme Specifications - Strictly Grayscale/Blue-Slate */
        :root {
            --bg-main: #050505;
            --surface-color: #0a0a0a;
            --card-bg: #111111;
            --border-color: #222222;
            --border-highlight: #333333;
            --text-primary: #e5e5e5;
            --text-secondary: #888888;
            --accent-green: #10b981;
            --accent-green-hover: #059669;
            --accent-blue: #3b82f6;
            --font-main: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', Consolas, monospace;
        }

        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden; /* Prevent body scroll on desktop */
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar Styling */
        .navbar {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 0;
            z-index: 1000;
            flex-shrink: 0;
        }

        .navbar-brand {
            color: #ffffff;
            font-weight: 600;
            letter-spacing: -0.5px;
            font-size: 1.25rem;
        }

        .btn-google {
            background-color: transparent;
            border: 1px solid var(--border-highlight);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-google:hover {
            background-color: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        /* Main Workspace Area */
        .workspace-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 1.5rem;
            gap: 1.5rem;
        }

        /* Premium Cards */
        .premium-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.8);
        }

        .card-header {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        /* Form Controls */
        .form-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .form-select {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .form-select:focus {
            background-color: var(--surface-color);
            border-color: var(--accent-blue);
            color: #ffffff;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        /* IDE Textarea */
        textarea.form-control {
            background-color: #000000;
            border: 1px solid var(--border-color);
            color: #d1d5db;
            border-radius: 8px;
            padding: 1.25rem;
            font-family: var(--font-code);
            font-size: 0.9rem;
            line-height: 1.6;
            flex: 1;
            resize: none;
            overflow-y: auto;
            margin-bottom: 1rem;
        }

        textarea.form-control:focus {
            background-color: #000000;
            border-color: var(--accent-blue);
            color: #ffffff;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        /* Buttons */
        .btn-primary {
            background-color: var(--text-primary);
            color: #000000;
            border: none;
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            width: 100%;
            justify-content: center;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #ffffff;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background-color: #333333;
            color: #666666;
            cursor: not-allowed;
        }

        /* Results Area */
        .result-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-main); 
        }
        ::-webkit-scrollbar-thumb {
            background: #333; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }

        /* Result Content Styling */
        .result-scroll-area h3 {
            font-size: 1.1rem;
            color: #ffffff;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .result-scroll-area h3:first-child {
            margin-top: 0;
        }

        .result-scroll-area p {
            color: #a3a3a3;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* Markdown Code Blocks with Copy Button */
        pre {
            background-color: #000000 !important;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2.5rem 1.25rem 1.25rem 1.25rem !important; 
            overflow-x: auto;
            margin-bottom: 1.5rem;
            position: relative;
        }

        code {
            color: var(--accent-blue);
            font-family: var(--font-code);
            font-size: 0.85rem;
            line-height: 1.5;
        }

        /* Premium Copy Button */
        .btn-copy {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background-color: #1a1a1a;
            border: 1px solid var(--border-highlight);
            color: var(--text-secondary);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
            font-family: var(--font-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .btn-copy:hover {
            background-color: #2a2a2a;
            color: #ffffff;
            border-color: #444444;
        }

        .btn-copy.copied {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
            color: #ffffff;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .spinner-border {
            width: 1.2rem;
            height: 1.2rem;
            border-width: 0.15em;
        }

        /* Mobile Adjustments */
        @media (max-width: 991px) {
            body {
                overflow: auto; /* Allow scrolling on mobile */
            }
            .workspace-container {
                flex-direction: column;
                height: auto;
                overflow: visible;
            }
            .premium-card {
                min-height: 500px; /* Ensure cards have height on mobile */
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-braces me-2" style="color: var(--accent-blue);"></i>
                NEXUS ENGINE
            </a>
            <div class="d-flex">
                <button class="btn btn-google d-flex align-items-center gap-2">
                    <i class="bi bi-google"></i>
                    <span class="d-none d-sm-inline">Login with Google</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Workspace (Side-by-Side on Desktop) -->
    <main class="workspace-container">
        
        <!-- Left Column: Input Editor -->
        <div class="col-lg-5 col-xl-4 h-100">
            <div class="premium-card">
                <div class="card-header">
                    <span><i class="bi bi-terminal me-2"></i>Source Configuration</span>
                </div>
                <div class="card-body">
                    <label for="languageSelect" class="form-label">Target Environment</label>
                    <select class="form-select" id="languageSelect">
                        <option value="All-in-One (HTML/CSS/JS)" selected>All-in-One (HTML/CSS/JS)</option>
                        <option value="HTML">HTML Only</option>
                        <option value="CSS">CSS Only</option>
                        <option value="JavaScript">JavaScript Only</option>
                    </select>

                    <label for="codeInput" class="form-label">Source Code</label>
                    <textarea class="form-control" id="codeInput" placeholder="<!-- Paste your HTML, CSS, or JS code here -->"></textarea>

                    <button id="analyzeBtn" class="btn btn-primary d-flex align-items-center gap-2">
                        <span>Analyze & Refactor Code</span>
                        <div id="loadingSpinner" class="spinner-border text-dark d-none" role="status"></div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Column: AI Output -->
        <div class="col-lg-7 col-xl-8 h-100">
            <div class="premium-card">
                <div class="card-header">
                    <span><i class="bi bi-cpu me-2"></i>AI Diagnostic Output</span>
                </div>
                <div class="card-body">
                    <div id="resultBox" class="result-scroll-area">
                        
                        <!-- Default Empty State -->
                        <div class="empty-state" id="emptyState">
                            <i class="bi bi-code-square"></i>
                            <h4>Awaiting Input</h4>
                            <p>Paste your frontend code on the left and click Analyze.<br>The AI will output the full, refactored code here.</p>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- JavaScript Logic -->
    <script>
        // HARDCODE YOUR FULL GROQ API KEY HERE
        const GROQ_API_KEY = "your_full_groq_api_key_here"; // Replace with your actual API key

        const analyzeBtn = document.getElementById('analyzeBtn');
        const codeInput = document.getElementById('codeInput');
        const languageSelect = document.getElementById('languageSelect');
        const resultBox = document.getElementById('resultBox');
        const emptyState = document.getElementById('emptyState');
        const loadingSpinner = document.getElementById('loadingSpinner');

        function addCopyButtons() {
            const preTags = resultBox.querySelectorAll('pre');
            
            preTags.forEach((pre) => {
                pre.style.position = 'relative';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'btn-copy';
                copyBtn.innerHTML = '<i class="bi bi-clipboard"></i> Copy';

                copyBtn.addEventListener('click', async () => {
                    const code = pre.querySelector('code').innerText;
                    try {
                        await navigator.clipboard.writeText(code);
                        copyBtn.innerHTML = '<i class="bi bi-check2"></i> Copied';
                        copyBtn.classList.add('copied');
                        
                        setTimeout(() => {
                            copyBtn.innerHTML = '<i class="bi bi-clipboard"></i> Copy';
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    } catch (err) {
                        console.error('Failed to copy text: ', err);
                        copyBtn.innerHTML = '<i class="bi bi-x-circle"></i> Error';
                    }
                });

                pre.appendChild(copyBtn);
            });
        }

        analyzeBtn.addEventListener('click', async () => {
            const code = codeInput.value.trim();
            const language = languageSelect.value;

            if (!code) {
                resultBox.innerHTML = `<div class="text-danger fw-medium"><i class="bi bi-exclamation-triangle-fill me-2"></i>Please paste the web code you want the AI to analyze in the left panel.</div>`;
                return;
            }

            // Reset UI for processing state
            if(emptyState) emptyState.style.display = 'none';
            resultBox.innerHTML = '';
            loadingSpinner.classList.remove('d-none');
            analyzeBtn.disabled = true;

            try {
                // FIXED PROMPT: Enforcing full code output and strictly banning truncating.
                const systemPrompt = `You are a Principal Web Architect focusing strictly on frontend technologies. 
                The user has indicated their code is: ${language}.
                
                CRITICAL INSTRUCTIONS: 
                1. You are strictly limited to analyzing HTML, CSS, and JavaScript. If the user submits Python, C++, Java, etc., you must reply ONLY with: "### ❌ Unsupported Language. I only process HTML, CSS, and JS."
                2. YOU MUST OUTPUT THE ENTIRE, 100% COMPLETE REFACTORED CODE. 
                3. NEVER truncate the code. NEVER use placeholders like "// rest of the code". 
                4. Provide the fully working, ready-to-copy code block that the user can immediately paste and use.
                
                Format your response exactly like this:
                ### Diagnostic Analysis
                (Briefly explain the bugs and fixes)
                
                ### Optimized Code
                (Provide the FULL, complete code in a single markdown block)`;

                // Call Groq API
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile', 
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: code }
                        ],
                        temperature: 0.1, 
                        max_tokens: 6000 // Increased tokens to ensure long code doesn't get cut off
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `HTTP Server Error: ${response.status}`);
                }

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                // Parse markdown and inject into DOM
                resultBox.innerHTML = marked.parse(aiResponse);
                addCopyButtons();

            } catch (error) {
                resultBox.innerHTML = `<div class="text-danger fw-medium"><i class="bi bi-exclamation-triangle-fill me-2"></i>System Fault: ${error.message}</div>`;
            } finally {
                loadingSpinner.classList.add('d-none');
                analyzeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
